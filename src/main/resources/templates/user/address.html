<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Account - Addresses</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f3f6;
            margin: 0;
            padding: 0;
        }

        /* Layout */
        .main-container {
            display: flex;
            max-width: 1100px;
            margin: 20px auto;
            gap: 20px;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .section {
            margin-bottom: 20px;
        }

        .section h3 {
            font-size: 13px;
            color: #878787;
            margin-bottom: 10px;
        }

        .section a {
            display: block;
            text-decoration: none;
            color: #212121;
            padding: 8px 0;
            font-size: 14px;
        }

        .section a:hover {
            color: #2874f0;
        }

        .active {
            color: #2874f0;
            font-weight: bold;
        }

        .logout {
            color: red;
            font-weight: bold;
        }

        /* Content */
        .content {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .add-btn {
            background: #2874f0;
            color: white;
            padding: 10px 15px;
            border-radius: 3px;
            text-decoration: none;
            font-weight: bold;
        }

        /* Address Card */
        .address {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            position: relative;
        }

        .default {
            border-left: 4px solid #2874f0;
            background: #fafcff;
        }

        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #2874f0;
            color: white;
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 3px;
        }

        .name {
            font-weight: bold;
        }

        .phone {
            color: #555;
            margin-left: 10px;
        }

        .address-text {
            margin-top: 8px;
            color: #333;
        }

        .actions {
            margin-top: 10px;
        }

        .actions button {
            background: none;
            border: none;
            color: #2874f0;
            font-weight: bold;
            margin-right: 15px;
            cursor: pointer;
        }

        .deliver-btn {
            background: #fb641b;
            color: white;
            padding: 8px 14px;
            border-radius: 3px;
            border: none;
            cursor: pointer;
        }

        .empty {
            text-align: center;
            color: gray;
        }

    </style>
</head>

<body>

<div class="main-container">

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="section">
            <h3>MY ORDERS</h3>
            <a th:href="@{/orders}">Track Order</a>
        </div>

        <div class="section">
            <h3>ACCOUNT SETTINGS</h3>
            <a th:href="@{/profile}">Profile Information</a>
            <a th:href="@{/my-account/address}" class="active">Manage Addresses</a>
            <a th:href="@{/pan}">PAN Card Information</a>
        </div>

        <div class="section">
            <h3>PAYMENTS</h3>
            <a href="#">Gift Cards ₹0</a>
            <a href="#">Saved UPI</a>
            <a href="#">Saved Cards</a>
        </div>

        <div class="section">
            <h3>MY STUFF</h3>
            <a href="#">My Coupons</a>
            <a href="#">My Reviews & Ratings</a>
            <a href="#">All Notifications</a>
            <a href="#">My Wishlist</a>
        </div>

        <div class="section">
            <a th:href="@{/logout}" class="logout">Logout</a>
        </div>

    </div>

    <!-- Content -->
    <div class="content">

        <div class="header">
            <h2>My Addresses</h2>
            <a class="add-btn" th:href="@{/my-account/address/add-page}">
                + ADD A NEW ADDRESS
            </a>
        </div>

        <!-- Empty -->
        <div th:if="${#lists.isEmpty(addresses)}" class="empty">
            No addresses found
        </div>

        <!-- Address List -->
        <div th:each="addr : ${addresses}"
             th:classappend="${addr.isDefault} ? 'address default' : 'address'">

            <div class="badge" th:if="${addr.isDefault}">DEFAULT</div>

            <div>
                <span class="name" th:text="${addr.name}"></span>
                <span class="phone" th:text="${addr.phone}"></span>
            </div>

            <div class="address-text">
                <span th:text="${addr.fullAddress}"></span><br>
                <span th:text="${addr.city}"></span>,
                <span th:text="${addr.state}"></span> -
                <span th:text="${addr.pincode}"></span>
            </div>

            <div class="actions">
                <button th:onclick="'location.href=\'/my-account/address/edit/' + ${addr.id} + '\''">
                    EDIT
                </button>

                <button th:onclick="'location.href=\'/my-account/address/delete/' + ${addr.id} + '\''">
                    DELETE
                </button>

                <button class="deliver-btn"
                        th:onclick="'location.href=\'/checkout?addressId=' + ${addr.id} + '\''">
                    DELIVER HERE
                </button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
