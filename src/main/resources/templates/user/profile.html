<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f5f6fa;
        }

        .profile-card{
            max-width:600px;
            margin:auto;
            border-radius:12px;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
        }

        .profile-header{
            background:#0d6efd;
            color:white;
            padding:20px;
            border-radius:12px 12px 0 0;
            text-align:center;
        }

        .profile-photo{
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid white;
            margin-top:-60px;
            background:white;
        }

        .form-control{
            border-radius:8px;
        }

        .btn-update{
            width:100%;
            border-radius:8px;
            font-weight:500;
        }

    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card profile-card">

        <!-- Header -->
        <div class="profile-header">
            <h4>My Profile</h4>
            <p class="mb-0">Manage your account information</p>
        </div>

        <div class="card-body text-center">

            <!-- Profile Image -->
            <img th:src="${profile.profileImageUrl}"
                 class="profile-photo"
                 onerror="this.src='/images/default-user.png'">

            <h5 class="mt-3" th:text="${profile.name}">User Name</h5>
            <p class="text-muted" th:text="${profile.email}">email@example.com</p>

            <hr>

            <!-- Profile Form -->
            <form id="profileForm" th:object="${profile}" onsubmit="updateProfile(event)">

                <input type="hidden" name="userId" th:value="${userId}">

                <div class="mb-3 text-start">
                    <label class="form-label">Full Name</label>
                    <input type="text" th:field="*{name}" class="form-control">
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control">
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label">Phone</label>
                    <input type="text" th:field="*{phone}" class="form-control">
                </div>

                <button type="submit" class="btn btn-primary btn-update">
                    Update Profile
                </button>

            </form>

        </div>

    </div>

</div>

<script>

    function updateProfile(event) {

        event.preventDefault();

        const form = document.getElementById('profileForm');
        const userId = form.querySelector('input[name="userId"]').value;

        const dto = {
            name: form.querySelector('input[name="name"]').value,
            email: form.querySelector('input[name="email"]').value,
            phone: form.querySelector('input[name="phone"]').value
        };

        fetch('/my-account/profile-update?userId=' + userId,{
            method:'POST',
            headers:{
                'Content-Type':'application/json'
            },
            body:JSON.stringify(dto)
        })
        .then(res=>res.text())
        .then(msg=>{
            alert(msg);
        })
        .catch(err=>console.error(err));

    }

</script>

</body>
</html>
