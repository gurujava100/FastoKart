<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Shop | Products</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; }

        .navbar-custom {
            background-color:#2874f0;
        }
        .navbar-custom .nav-link,
        .navbar-custom .navbar-brand {
            color:white !important;
        }

        .category-row {
            display:flex;
            overflow-x:auto;
            gap:1rem;
            padding:0.5rem 0;
        }

        .category-item {
            flex-shrink:0;
            width:100px;
            text-align:center;
            text-decoration:none;
            color:inherit;
        }

        .category-item img {
            width:80px;
            height:80px;
            object-fit:cover;
            border-radius:8px;
        }

        .category-item.active {
            border:2px solid #2874f0;
            border-radius:10px;
            padding:5px;
            background:#e9f2ff;
        }

        .product-card img {
            height:160px;
            object-fit:contain;
        }
    </style>
</head>
<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
        <a class="navbar-brand" th:href="@{/index}">MyShop</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- ================= HEADER ================= -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>All Products</h4>
    </div>

    <!-- ================= CATEGORY FILTER ================= -->
    <div class="mb-4">
        <h6>Categories</h6>

        <div class="category-row">

            <a th:each="cat : ${categories}"
               th:href="@{/index(category=${cat.id})}"
               class="category-item"
               th:classappend="${selectedCategory == cat.id} ? 'active'">

                <img th:if="${cat.imageName != null}"
                     th:src="@{'/api/categories/image/' + ${cat.imageName}}">
                <img th:unless="${cat.imageName != null}"
                     th:src="@{/assets/n.jpg}">

                <div th:text="${cat.name}"></div>
            </a>

        </div>
    </div>

    <!-- ================= PRODUCTS GRID ================= -->
    <div class="row">

        <div class="col-6 col-md-3 mb-4"
             th:each="product : ${productPage.content}">

            <div class="card product-card h-100 shadow-sm text-center">

                <img th:if="${product.imageName != null}"
                     th:src="@{'/api/products/image/' + ${product.imageName}}"
                     class="card-img-top p-2">

                <img th:unless="${product.imageName != null}"
                     th:src="@{/assets/n.jpg}"
                     class="card-img-top p-2">

                <div class="card-body p-2">
                    <h6 th:text="${product.name}"></h6>

                    <p class="text-muted">
                        ₹ <span th:text="${product.price}"></span>
                    </p>

                    <a th:href="@{'/product/' + ${product.id}}"
                       class="btn btn-sm btn-primary">
                        View
                    </a>
                </div>

            </div>
        </div>

    </div>

    <!-- ================= PAGE INFO ================= -->
    <div class="text-center mt-3"
         th:if="${productPage.totalElements > 0}">

        Showing page
        <strong th:text="${productPage.number + 1}"></strong>
        of
        <strong th:text="${productPage.totalPages}"></strong>
        |
        Total Products:
        <strong th:text="${productPage.totalElements}"></strong>
    </div>

    <!-- ================= PAGINATION ================= -->
    <nav th:if="${productPage.totalPages > 1}">
        <ul class="pagination justify-content-center mt-3">

            <!-- PREVIOUS -->
            <li class="page-item"
                th:classappend="${productPage.first} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/index(page=${productPage.number - 1},
                                     category=${selectedCategory})}">
                    Previous
                </a>
            </li>

            <!-- PAGE NUMBERS -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}"
                th:classappend="${i == productPage.number} ? 'active'">

                <a class="page-link"
                   th:href="@{/index(page=${i},
                                     category=${selectedCategory})}"
                   th:text="${i + 1}">
                </a>
            </li>

            <!-- NEXT -->
            <li class="page-item"
                th:classappend="${productPage.last} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/index(page=${productPage.number + 1},
                                     category=${selectedCategory})}">
                    Next
                </a>
            </li>

        </ul>
    </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
