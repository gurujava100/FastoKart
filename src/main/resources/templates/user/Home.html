<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Shop | Products</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }

        .navbar-custom {
            background-color:#2874f0;
        }
        .navbar-custom .nav-link,
        .navbar-custom .navbar-brand {
            color:white !important;
        }

        .category-row {
            display:flex;
            overflow-x:auto;
            gap:1rem;
            padding:0.5rem 0;
        }

        .category-item {
            flex-shrink:0;
            width:100px;
            text-align:center;
            text-decoration:none;
            color:inherit;
        }

        .category-item img {
            width:80px;
            height:80px;
            object-fit:cover;
            border-radius:8px;
        }

        .category-item.active {
            border:2px solid #2874f0;
            border-radius:10px;
            padding:5px;
            background:#e9f2ff;
        }

        .product-card img {
            height:160px;
            object-fit:contain;
        }
    </style>
</head>
<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">

        <!-- Brand -->
        <a class="navbar-brand" th:href="@{/index}">MyShop</a>

        <!-- Toggle Button (for mobile) -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navbar Items -->
        <div class="collapse navbar-collapse justify-content-end"
             id="navbarContent">

            <ul class="navbar-nav align-items-center">

                <!-- Cart -->
                <li class="nav-item me-3">
                    <a class="nav-link position-relative d-flex align-items-center"
                       th:href="@{/cart}">
                        <i class="bi bi-cart3 fs-5 text-primary me-1"></i>
                        <span class="fw-semibold">My Cart</span>
                        <span class="position-absolute top-0 start-100 translate-middle
                                     badge rounded-pill bg-danger"
                              th:text="${cartCount}">
                            0
                        </span>
                    </a>
                </li>

                <!-- My Account Dropdown -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center"
                       href="#"
                       id="accountDropdown"
                       role="button"
                       data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle text-primary me-1"></i>
                        <span>My Account</span>
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{/my-account/dashboard}">Dashboard</a></li>
                        <!-- Assume controller adds userId to the model -->
                        <li>
                            <a class="dropdown-item" th:onclick="'openProfile(' + ${userId} + ')'">Profile</a>
                        </li>
                        <li><a class="dropdown-item" th:href="@{/my-account/addresses}">Addresses</a></li>
                        <li><a class="dropdown-item" th:href="@{/my-account/orders}">Orders</a></li>

                        <li><hr class="dropdown-divider"></li>

                        <!-- Phase 2 -->
                        <li><a class="dropdown-item" th:href="@{/my-account/wishlist}">❤️ Wishlist</a></li>
                        <li><a class="dropdown-item" th:href="@{/my-account/returns}">🔁 Returns & Refund</a></li>
                        <li><a class="dropdown-item" th:href="@{/my-account/wallet}">💳 Wallet</a></li>
                        <li><a class="dropdown-item" th:href="@{/cart}">🛒 Cart</a></li>

                        <li><hr class="dropdown-divider"></li>

                        <!-- Security -->
                        <li><a class="dropdown-item" th:href="@{/my-account/security}">🔐 Security</a></li>

                        <li><hr class="dropdown-divider"></li>

                        <li><a class="dropdown-item text-danger" th:href="@{/logout}">🚪 Logout</a></li> </ul>
                </li>

            </ul>
        </div>

    </div>
</nav>

<div class="container mt-4">

    <!-- ================= HEADER ================= -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>All Products</h4>
    </div>

    <!-- ================= CATEGORY FILTER ================= -->
    <div class="mb-4">
        <h6>Categories</h6>

        <div class="category-row">

            <a th:each="cat : ${categories}"
               th:href="@{/index(category=${cat.id})}"
               class="category-item"
               th:classappend="${selectedCategory == cat.id} ? 'active'">

                <img th:if="${cat.imageName != null}"
                     th:src="@{'/api/categories/image/' + ${cat.imageName}}">
                <img th:unless="${cat.imageName != null}"
                     th:src="@{/assets/n.jpg}">

                <div th:text="${cat.name}"></div>
            </a>

        </div>
    </div>

    <!-- ================= PRODUCTS GRID ================= -->
    <div class="row">

        <div class="col-6 col-md-3 mb-4"
             th:each="product : ${productPage.content}">

            <div class="card product-card h-100 shadow-sm text-center">

                <img th:if="${product.imageName != null}"
                     th:src="@{'/api/products/image/' + ${product.imageName}}"
                     class="card-img-top p-2">

                <img th:unless="${product.imageName != null}"
                     th:src="@{/assets/n.jpg}"
                     class="card-img-top p-2">

                <div class="card-body p-2">
                    <h6 th:text="${product.name}"></h6>

                    <p class="text-muted">
                        ₹ <span th:text="${product.price}"></span>
                    </p>

                    <a th:href="@{'/product/' + ${product.id}}"
                       class="btn btn-sm btn-primary">
                        View
                    </a>
                </div>

            </div>
        </div>

    </div>

    <!-- ================= PAGE INFO ================= -->
    <div class="text-center mt-3"
         th:if="${productPage.totalElements > 0}">

        Showing page
        <strong th:text="${productPage.number + 1}"></strong>
        of
        <strong th:text="${productPage.totalPages}"></strong>
        |
        Total Products:
        <strong th:text="${productPage.totalElements}"></strong>
    </div>

    <!-- ================= PAGINATION ================= -->
    <nav th:if="${productPage.totalPages > 1}">
        <ul class="pagination justify-content-center mt-3">

            <!-- PREVIOUS -->
            <li class="page-item"
                th:classappend="${productPage.first} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/index(page=${productPage.number - 1},
                                     category=${selectedCategory})}">
                    Previous
                </a>
            </li>

            <!-- PAGE NUMBERS -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}"
                th:classappend="${i == productPage.number} ? 'active'">

                <a class="page-link"
                   th:href="@{/index(page=${i},
                                     category=${selectedCategory})}"
                   th:text="${i + 1}">
                </a>
            </li>

            <!-- NEXT -->
            <li class="page-item"
                th:classappend="${productPage.last} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/index(page=${productPage.number + 1},
                                     category=${selectedCategory})}">
                    Next
                </a>
            </li>

        </ul>
    </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">

</script>
<script>
    function openProfile(userId) {
        alert(userId);
        window.location.href = "/my-account/profile-page?userId=" + userId;
    }
</script>
</body>
</html>
