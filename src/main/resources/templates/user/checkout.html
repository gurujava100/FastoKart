<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout</title>

    <style>
        body{font-family:Arial;background:#f4f6f9;margin:0}
        .container{max-width:1100px;margin:40px auto;display:grid;grid-template-columns:1.3fr .7fr;gap:25px}
        .card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
        h2{margin:0 0 15px}
        select{width:100%;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #ddd}
        .product{display:flex;gap:15px;align-items:center}
        .product img{width:90px;height:90px;border-radius:10px;object-fit:cover}
        .price{font-size:22px;font-weight:700;color:#28a745}
        .summary div{display:flex;justify-content:space-between;margin:10px 0}
        .btn{background:#ffb300;border:none;padding:14px;width:100%;border-radius:40px;font-weight:700;cursor:pointer}
        .address-box{border:1px solid #ddd;padding:12px;border-radius:10px;margin-top:10px}
        .change-btn{margin-top:10px;background:#eee;border:none;padding:8px 12px;border-radius:8px;cursor:pointer}
        .error{color:red;margin-top:10px}
    </style>
</head>

<body>

<div class="container">

    <!-- LEFT: ADDRESS + PAYMENT -->
    <div class="card">
        <h2>Delivery Address</h2>

        <!-- Address Display -->
        <div id="addressContainer">
            Loading address...
        </div>

        <button class="change-btn" onclick="loadAllAddresses()">Change Address</button>

        <!-- Hidden addressId -->
        <input type="hidden" id="selectedAddressId">

        <h2 style="margin-top:20px;">Payment</h2>
        <select id="paymentMethod">
            <option value="COD">Cash on Delivery</option>
            <option value="ONLINE">Online Payment</option>
        </select>

        <button class="btn" onclick="placeOrder()">Place Order</button>

        <div class="error" id="errorMsg"></div>
    </div>

    <!-- RIGHT: ORDER SUMMARY -->
    <div class="card">
        <h2>Order Summary</h2>

        <div class="product">
            <img th:src="@{'/api/products/image/' + ${product.imageName}}">
            <div>
                <div th:text="${product.name}">Product Name</div>
                <div class="price">₹<span th:text="${product.price}">0</span></div>
            </div>
        </div>

        <hr>

        <div class="summary">
            <div>
                <span>Subtotal</span>
                <span>₹<span th:text="${product.price * qty}">0</span></span>
            </div>

            <div>
                <span>Delivery</span>
                <span>₹50</span>
            </div>

            <div>
                <strong>Total</strong>
                <strong>₹<span th:text="${total + 50}">0</span></strong>
            </div>
        </div>
    </div>

</div>

<script>

    window.onload = function () {
        loadDefaultAddress();
    };

    function loadDefaultAddress(){
        fetch('/my-account/address/default', {
            method: 'GET',
            credentials: 'include'   // 🔥 MUST ADD
        })
            .then(res => {
                if(!res.ok) throw new Error("Not logged in");
                return res.json();
            })
            .then(data => {
                document.getElementById("addressContainer").innerHTML = `
            <div class="address-box">
                <b>${data.name}</b><br>
                  ${data.state},
                 ${data.city} - ${data.pincode}<br>
                ${data.phone}
            </div>
        `;
                document.getElementById("selectedAddressId").value = data.id;
            })
            .catch(() => {
                document.getElementById("addressContainer").innerHTML =
                    "<p>No default address found</p>";
            });
    }

    function loadAllAddresses(){
        fetch('/my-account/address')
            .then(res => res.json())
            .then(list => {

                let html = "";

                list.forEach(addr => {
                    html += `
                    <div class="address-box" onclick="selectAddress(${addr.id})">
                        <b>${addr.fullName}</b><br>
                        ${addr.state}, ${addr.city} - ${addr.pincode}<br>
                        ${addr.phone}
                    </div>
                `;
                });

                document.getElementById("addressContainer").innerHTML = html;
            });
    }

    function selectAddress(id){
        document.getElementById("selectedAddressId").value = id;
        loadDefaultAddress(); // reload selected
    }

</script>
<script th:src="@{/js/order.js}"></script>
</body>
</html>
