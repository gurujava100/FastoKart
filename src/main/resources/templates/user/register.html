<!DOCTYPE html>
<html>
<head>
    <title>Register - Fastokart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="col-md-5 mx-auto">
        <div class="card p-4 shadow">

            <h3 class="text-center mb-3">Create Account</h3>

            <div id="message"></div>

            <input type="text" id="name" class="form-control mb-3"
                   placeholder="Full Name">

            <input type="email" id="email" class="form-control mb-3"
                   placeholder="Email">

            <input type="text" id="phone" class="form-control mb-3"
                   placeholder="Phone">

            <input type="password" id="password" class="form-control mb-3"
                   placeholder="Password">
            <input type="file" id="image" class="form-control mb-3">
            <!-- Button with onclick -->
            <button onclick="registerUser()"
                    class="btn btn-primary w-100">
                Register
            </button>

        </div>
    </div>
</div>
<script th:src="@{/js/user.js}"></script>
</body>
</html>
